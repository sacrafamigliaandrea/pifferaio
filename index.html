<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1a3a52">
<title>Il pifferaio magico — fiaba interattiva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Atkinson+Hyperlegible:wght@400;700&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  /* Palette fiaba antica — pergamena + ciano profondo + oro caldo */
  --paper:#F6EFE0;
  --paper-2:#EFE6D2;
  --paper-edge:#D9CDB1;
  --ink:#1F1A14;
  --ink-soft:#5C4A35;
  --ink-faint:#8B7458;

  --accent:#1A3A52;        /* blu pifferaio */
  --accent-2:#2C5775;
  --accent-soft:#E0EBF2;
  --gold:#C99030;
  --gold-soft:#F5E5C2;

  --ok:#2E7D4F;            /* verde corretto */
  --ok-soft:#D9EFDE;
  --ko:#B83A3A;            /* rosso errore */
  --ko-soft:#F4D9D9;

  --shadow:0 1px 2px rgba(31,26,20,.08), 0 4px 14px rgba(31,26,20,.06);
  --shadow-lg:0 8px 28px rgba(31,26,20,.18);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:'Atkinson Hyperlegible',system-ui,sans-serif;overflow-x:hidden}
button{font-family:inherit;cursor:pointer;border:none;background:none}

#app{min-height:100dvh;display:flex;flex-direction:column;background:
  radial-gradient(1200px 600px at 50% -200px, #FBF6E8 0%, var(--paper) 60%),
  var(--paper);
}

/* ════════════ TOOLBAR ════════════ */
#toolbar{
  position:sticky;top:0;z-index:40;
  background:rgba(246,239,224,.92);
  backdrop-filter:saturate(140%) blur(10px);
  -webkit-backdrop-filter:saturate(140%) blur(10px);
  border-bottom:1px solid var(--paper-edge);
}
.tb-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;max-width:920px;margin:0 auto;
}
.tb-start,.tb-mid,.tb-end{display:flex;align-items:center;gap:10px}
.tb-mid{flex:1;justify-content:center;min-width:0}
.tb-end{margin-left:auto}

.tb-btn{
  width:40px;height:40px;border-radius:12px;
  background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;
  transition:transform .12s, background .15s, opacity .2s;
  flex-shrink:0;
}
.tb-btn:active{transform:scale(.94)}
.tb-btn:hover{background:var(--accent-2)}
.tb-btn:disabled{opacity:.4;cursor:not-allowed}
.tb-btn svg{width:20px;height:20px}
.tb-btn.ghost{background:transparent;color:var(--accent);border:1.5px solid var(--paper-edge)}
.tb-btn.ghost:hover{background:var(--accent-soft)}

/* progress + stats blocco */
.tb-prog{
  display:flex;align-items:center;gap:10px;
  background:#fff;border:1px solid var(--paper-edge);
  border-radius:100px;padding:6px 14px 6px 8px;
  min-width:200px;max-width:340px;flex:1;
  box-shadow:var(--shadow);
}
.tb-prog-bar{
  flex:1;height:8px;background:var(--paper-2);border-radius:100px;overflow:hidden;
  position:relative;
}
.tb-prog-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--gold) 0%, #E5B454 100%);
  border-radius:100px;transition:width .35s ease;
}
.tb-prog-pct{
  font-size:.78rem;font-weight:700;color:var(--accent);
  font-variant-numeric:tabular-nums;min-width:32px;text-align:right;
}
.tb-stats{
  display:flex;align-items:center;gap:4px;
  background:var(--ok-soft);color:var(--ok);
  border-radius:100px;padding:4px 12px;
  font-weight:700;font-size:.85rem;
  font-variant-numeric:tabular-nums;
}
.tb-stats svg{width:14px;height:14px}
.tb-stats.empty{background:var(--paper-2);color:var(--ink-faint)}

.tb-name{
  font-family:'Lora',serif;font-style:italic;
  color:var(--ink-soft);font-size:.92rem;
  max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* ════════════ STORY ════════════ */
#story{
  flex:1;
  padding:32px 16px 120px;
  position:relative;
}
.story-content{
  max-width:760px;margin:0 auto;
  background:linear-gradient(180deg,#FCF7E8 0%, #F8F0D8 100%);
  border:1px solid var(--paper-edge);
  border-radius:18px;
  padding:48px 44px;
  box-shadow:var(--shadow);
  position:relative;
}
.story-content::before{
  content:"";position:absolute;inset:6px;
  border:1px solid rgba(217,205,177,.45);
  border-radius:14px;pointer-events:none;
}

.story-header{text-align:center;margin-bottom:36px}
.story-header h1{
  font-family:'Lora',serif;
  font-size:clamp(1.8rem,4vw,2.4rem);
  font-weight:600;color:var(--accent);
  letter-spacing:.01em;line-height:1.15;
}
.story-subtitle{
  font-family:'Lora',serif;font-style:italic;
  color:var(--ink-faint);
  font-size:1rem;margin-top:6px;
}
.story-rule{
  width:80px;height:2px;
  background:var(--gold);
  margin:18px auto 0;
}
.story-rule::before,.story-rule::after{
  content:"";display:inline-block;width:6px;height:6px;
  background:var(--gold);border-radius:50%;
  position:relative;top:-2px;
}
.story-rule::before{margin-right:8px;float:left}
.story-rule::after{margin-left:8px;float:right}

/* ════════════ TESTO + WORD-LEVEL HIGHLIGHT ════════════ */
.story-text{
  font-family:'Lora',serif;
  font-size:clamp(1.12rem,1.4vw,1.28rem);
  line-height:1.95;
  color:var(--ink);
  text-align:justify;
  hyphens:auto;
}
.w{
  display:inline;
  transition:color .15s, background .25s;
  border-radius:3px;
  padding:0 1px;
}
.w.read{color:var(--ink-faint)}
.w.now{
  color:var(--accent);
  background:var(--gold-soft);
  font-weight:600;
}

/* ════════════ CLOZE ════════════ */
.cz{
  display:inline-flex;align-items:center;gap:4px;
  vertical-align:middle;
  margin:0 2px;
  font-family:'Atkinson Hyperlegible',sans-serif;
}
.cz-input{
  font-family:inherit;font-size:.95em;font-weight:700;
  width:6.5em;height:2em;
  padding:0 8px;
  border:2px dashed var(--ink-faint);
  border-radius:8px;
  background:#fff;color:var(--ink);
  text-align:center;outline:none;
  transition:all .2s;
  text-transform:lowercase;
}
.cz-input::placeholder{color:var(--ink-faint);font-weight:400;font-style:italic;font-size:.85em}
.cz-input:focus{
  border-style:solid;border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-soft);
}
.cz-input.pending{
  border-style:solid;border-color:var(--gold);
  background:#FFFCF2;
  animation:bounce 1.6s ease-in-out infinite;
}
.cz-input.solved{
  border-style:solid;border-color:var(--ok);
  background:var(--ok-soft);color:var(--ok);
  cursor:default;
  width:auto;min-width:5em;
  padding:0 12px;
  animation:none;
}
.cz-input.shown{
  border-style:dotted;border-color:var(--gold);
  background:var(--gold-soft);color:var(--ink-soft);
  cursor:default;
  width:auto;min-width:5em;
  padding:0 12px;
  font-style:italic;
  animation:none;
}
.cz-input.wrong{
  border-color:var(--ko);
  background:var(--ko-soft);color:var(--ko);
  animation:shake .42s;
}
@keyframes bounce{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-3px)}
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
.cz-btn{
  width:1.85em;height:1.85em;
  border-radius:50%;
  background:var(--accent-soft);color:var(--accent);
  display:inline-flex;align-items:center;justify-content:center;
  transition:transform .15s, background .15s, opacity .2s;
  font-size:.85em;
  flex-shrink:0;
}
.cz-btn:hover{background:#CFE0EC;transform:scale(1.05)}
.cz-btn:active{transform:scale(.92)}
.cz-btn svg{width:.95em;height:.95em}
.cz-btn.cz-replay.playing{
  background:var(--gold);color:#fff;
  animation:pulse 1s ease-in-out infinite;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(201,144,48,.5)}
  50%{box-shadow:0 0 0 6px rgba(201,144,48,0)}
}
.cz-btn.cz-hint{background:var(--gold-soft);color:var(--gold)}
.cz-btn.cz-hint:hover{background:#EBD089}
.cz.solved .cz-btn{display:none}
.cz.shown .cz-btn{display:none}

/* ════════════ YT HOST (nascosto) ════════════ */
#yt-host{
  position:fixed;left:-2000px;top:-2000px;
  width:1px;height:1px;overflow:hidden;
  opacity:0;pointer-events:none;
}

/* ════════════ FEEDBACK BANNER ════════════ */
#feedback{
  position:fixed;left:50%;top:78px;
  transform:translateX(-50%) translateY(-120%);
  display:flex;align-items:center;gap:10px;
  padding:14px 24px;border-radius:100px;
  font-weight:700;font-size:1rem;
  box-shadow:var(--shadow-lg);
  transition:transform .35s cubic-bezier(.34,1.56,.64,1);
  z-index:50;pointer-events:none;
}
#feedback.show{transform:translateX(-50%) translateY(0)}
#feedback.ok{background:var(--ok);color:#fff}
#feedback.ko{background:var(--ko);color:#fff}
#feedback svg{width:22px;height:22px}

/* ════════════ DONE SCREEN ════════════ */
#done-screen{
  position:fixed;inset:0;z-index:80;
  background:rgba(31,26,20,.55);
  backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;
  padding:20px;
}
#done-screen.show{display:flex;animation:fadein .4s}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.done-card{
  background:linear-gradient(180deg,#FCF7E8 0%, #F8F0D8 100%);
  border:1px solid var(--paper-edge);
  border-radius:24px;
  padding:36px 32px;
  max-width:460px;width:100%;
  text-align:center;
  box-shadow:var(--shadow-lg);
  animation:popin .5s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popin{
  from{transform:scale(.85);opacity:0}
  to{transform:scale(1);opacity:1}
}
.done-icon{
  width:84px;height:84px;margin:0 auto 14px;
  display:flex;align-items:center;justify-content:center;
  background:var(--gold);border-radius:50%;
  box-shadow:0 8px 20px rgba(201,144,48,.35);
}
.done-icon svg{width:50px;height:50px;color:#fff}
.done-title{
  font-family:'Lora',serif;font-size:1.85rem;font-weight:600;
  color:var(--accent);margin-bottom:8px;
}
.done-msg{
  color:var(--ink-soft);font-size:1rem;line-height:1.4;
  margin-bottom:24px;
}
.done-stats{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
  margin-bottom:24px;
}
.done-stat{
  background:#fff;border:1px solid var(--paper-edge);
  border-radius:12px;padding:14px 8px;
}
.done-stat-num{
  font-family:'Lora',serif;font-size:1.85rem;font-weight:700;
  color:var(--accent);line-height:1;
}
.done-stat-lbl{
  font-size:.72rem;color:var(--ink-faint);
  text-transform:uppercase;letter-spacing:.06em;
  margin-top:6px;font-weight:700;
}
.done-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.done-btn{
  padding:12px 24px;border-radius:100px;font-weight:700;font-size:.95rem;
  transition:transform .12s, background .15s;
}
.done-btn:active{transform:scale(.96)}
.done-btn.primary{background:var(--accent);color:#fff}
.done-btn.primary:hover{background:var(--accent-2)}
.done-btn.secondary{background:var(--paper-2);color:var(--ink)}
.done-btn.secondary:hover{background:var(--paper-edge)}

/* ════════════ MENU MODAL ════════════ */
#menu-modal{
  position:fixed;inset:0;z-index:90;
  background:rgba(31,26,20,.55);
  backdrop-filter:blur(6px);
  display:none;align-items:flex-end;justify-content:center;
  padding:0;
}
#menu-modal.show{display:flex;animation:fadein .25s}
.menu-card{
  background:var(--paper);
  border-top:1px solid var(--paper-edge);
  border-radius:24px 24px 0 0;
  padding:24px 20px 32px;
  max-width:520px;width:100%;
  animation:slideup .35s cubic-bezier(.34,1.56,.64,1);
}
@keyframes slideup{from{transform:translateY(100%)}to{transform:translateY(0)}}
.menu-grip{
  width:48px;height:5px;background:var(--paper-edge);
  border-radius:100px;margin:0 auto 14px;
}
.menu-title{
  font-family:'Lora',serif;font-size:1.5rem;font-weight:600;
  color:var(--accent);text-align:center;
}
.menu-sub{
  font-family:'Lora',serif;font-style:italic;
  color:var(--ink-faint);text-align:center;
  margin-bottom:20px;
}
.menu-item{
  width:100%;display:flex;align-items:center;gap:14px;
  padding:14px 16px;background:#fff;border:1px solid var(--paper-edge);
  border-radius:14px;margin-bottom:8px;
  text-align:left;font-size:.98rem;color:var(--ink);font-weight:500;
  transition:transform .12s, background .15s;
}
.menu-item:active{transform:scale(.98)}
.menu-item:hover{background:var(--paper-2)}
.menu-item svg{width:22px;height:22px;color:var(--accent);flex-shrink:0}
.menu-item.danger svg{color:var(--ko)}
.menu-item.danger{color:var(--ko)}

/* level pills */
.level-row{
  display:flex;gap:8px;margin-bottom:14px;
  background:var(--paper-2);
  padding:6px;border-radius:14px;
}
.level-pill{
  flex:1;padding:10px 6px;
  border-radius:10px;
  text-align:center;
  font-size:.85rem;font-weight:700;color:var(--ink-soft);
  background:transparent;
  transition:background .15s, color .15s, transform .12s;
}
.level-pill:active{transform:scale(.96)}
.level-pill.active{background:#fff;color:var(--accent);box-shadow:var(--shadow)}
.level-stars{display:block;color:var(--gold);font-size:.8rem;margin-top:2px;letter-spacing:1px}

/* ════════════ NICK MODAL (welcome) ════════════ */
#nick-modal{
  position:fixed;inset:0;z-index:100;
  background:linear-gradient(135deg,#1A3A52 0%, #0E2030 100%);
  display:flex;align-items:center;justify-content:center;
  padding:24px;
}
#nick-modal.hidden{display:none}
.nick-card{
  background:linear-gradient(180deg,#FCF7E8 0%, #F8F0D8 100%);
  border-radius:22px;
  padding:36px 30px;
  max-width:440px;width:100%;
  text-align:center;
  box-shadow:var(--shadow-lg);
}
.nick-card h2{
  font-family:'Lora',serif;font-weight:600;
  color:var(--accent);font-size:1.6rem;
  line-height:1.25;margin-bottom:8px;
}
.nick-card .sub{
  font-family:'Lora',serif;font-style:italic;
  color:var(--ink-faint);margin-bottom:22px;font-size:1rem;
}
.nick-input{
  width:100%;padding:14px 18px;font-size:1.05rem;
  border:2px solid var(--paper-edge);border-radius:12px;
  background:#fff;color:var(--ink);outline:none;
  text-align:center;font-family:'Lora',serif;
  transition:border-color .2s, box-shadow .2s;
  margin-bottom:20px;
}
.nick-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-soft);
}
.nick-card .nick-go{
  background:var(--accent);color:#fff;
  padding:14px 36px;border-radius:100px;
  font-weight:700;font-size:1rem;
  transition:transform .12s, background .15s;
}
.nick-card .nick-go:hover{background:var(--accent-2)}
.nick-card .nick-go:active{transform:scale(.96)}

/* loading */
#loading{
  position:fixed;inset:0;z-index:120;
  background:var(--paper);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:18px;
  transition:opacity .4s;
}
#loading.hidden{opacity:0;pointer-events:none}
.loader{
  width:48px;height:48px;border-radius:50%;
  border:4px solid var(--paper-2);
  border-top-color:var(--accent);
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading .lbl{
  font-family:'Lora',serif;font-style:italic;
  color:var(--ink-faint);
}

/* responsive */
@media (max-width:640px){
  .story-content{padding:32px 22px}
  .tb-name{display:none}
  .tb-prog{min-width:140px}
  #story{padding:20px 12px 100px}
}
@media (max-width:420px){
  .tb-row{padding:8px 10px;gap:6px}
  .tb-btn{width:38px;height:38px}
}

/* print friendly fallback */
@media print{#toolbar,#yt-host,#feedback,#done-screen,#menu-modal{display:none}}
</style>
</head>
<body>

<div id="app">

  <!-- TOOLBAR -->
  <div id="toolbar">
    <div class="tb-row">
      <div class="tb-start">
        <button class="tb-btn" id="btn-play" title="Play / Pausa">
          <svg id="ic-play" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="tb-btn ghost" id="btn-restart" title="Ricomincia">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/>
          </svg>
        </button>
      </div>

      <div class="tb-mid">
        <div class="tb-prog">
          <div class="tb-prog-bar"><div class="tb-prog-fill" id="progress-fill"></div></div>
          <span class="tb-prog-pct" id="progress-text">0%</span>
          <span class="tb-stats empty" id="stats-pill">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            <span id="stat-ok">0</span><span>/</span><span id="stat-total">0</span>
          </span>
        </div>
      </div>

      <div class="tb-end">
        <span class="tb-name" id="tb-name">—</span>
        <button class="tb-btn ghost" id="btn-menu" title="Menù">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="6" r="1.4" fill="currentColor"/><circle cx="12" cy="12" r="1.4" fill="currentColor"/><circle cx="12" cy="18" r="1.4" fill="currentColor"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- STORY -->
  <main id="story">
    <div class="story-content">
      <div class="story-header">
        <h1>Il pifferaio magico di Hamelin</h1>
        <div class="story-subtitle">una fiaba antica con lieto fine</div>
        <div class="story-rule"></div>
      </div>
      <div class="story-text" id="story-text"><!-- popolato da JS --></div>
    </div>
  </main>

  <!-- HOST IFRAME YT -->
  <div id="yt-host"><div id="yt-player"></div></div>
</div>

<!-- FEEDBACK -->
<div id="feedback">
  <span id="feedback-icon"></span>
  <span id="feedback-text"></span>
</div>

<!-- DONE SCREEN -->
<div id="done-screen">
  <div class="done-card">
    <div class="done-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2l2.39 7.36H22l-6.18 4.49 2.36 7.27L12 16.63l-6.18 4.49 2.36-7.27L2 9.36h7.61z"/>
      </svg>
    </div>
    <div class="done-title">Bravissimo!</div>
    <div class="done-msg" id="done-msg">Hai finito la fiaba del pifferaio magico.</div>
    <div class="done-stats">
      <div class="done-stat"><div class="done-stat-num" id="done-ok">0</div><div class="done-stat-lbl">indovinate</div></div>
      <div class="done-stat"><div class="done-stat-num" id="done-replays">0</div><div class="done-stat-lbl">riascolti</div></div>
      <div class="done-stat"><div class="done-stat-num" id="done-shown">0</div><div class="done-stat-lbl">aiuti</div></div>
    </div>
    <div class="done-actions">
      <button class="done-btn secondary" id="done-back">Cambia livello</button>
      <button class="done-btn primary" id="done-restart">Riascolta</button>
    </div>
  </div>
</div>

<!-- MENU -->
<div id="menu-modal">
  <div class="menu-card">
    <div class="menu-grip"></div>
    <div class="menu-title" id="menu-greeting">Ciao!</div>
    <div class="menu-sub">cosa vuoi fare?</div>

   ═══════════════════════════════════════════════════════ */
function norm(s){
  return (s||"").toString().toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")  // togli accenti
    .replace(/['']/g, "'")
    .replace(/[^a-z']/g, "")
    .trim();
}

      btnHint.addEventListener("click", (ev) => { ev.preventDefault(); revealWord(i); });

      input.addEventListener("keydown", (ev) => {
        if(ev.key === "Enter"){ ev.preventDefault(); validateCloze(i, input.value); }
      });
      input.addEventListener("blur", () => {
        // se non vuoto, valida; se vuoto e siamo in pending, lascia
        if(input.value.trim() && state.cloze[i].status === 'pending'){
          validateCloze(i, input.value);
        }
      });
      input.addEventListener("focus", () => {
        // se c'è una pendingClozeIdx diversa, salta a questa
        state.pendingClozeIdx = i;
      });

      wrap.appendChild(input);
      wrap.appendChild(btnReplay);
      wrap.appendChild(btnHint);
      txt.appendChild(wrap);
    } else {
      // parola normale
      const span = document.createElement("span");
      span.className = "w";
      span.dataset.i = i;
      span.textContent = tok.t;
      txt.appendChild(span);
    }
  });
}

/* ═══════════════════════════════════════════════════════
   VALIDAZIONE CLOZE
   ═══════════════════════════════════════════════════════ */
function validateCloze(i, value){
  const st = state.cloze[i];
  if(!st || st.status !== 'pending') return;
  const target = norm(STORY.tokens[i].b);
  const guess  = norm(value);
  if(!guess) return;

  st.attempts = (st.attempts||0) + 1;
  const wrap = $(`.cz[data-i="${i}"]`);
  const input = wrap.querySelector(".cz-input");

  if(guess === target){
    st.status = 'solved';
    state.okCount++;
    input.value = STORY.tokens[i].t;
    input.classList.remove("pending","wrong");
    input.classList.add("solved");
    input.disabled = true;
    wrap.classList.add("solved");
    flashFeedback(true, "Bravo!");
    if(state.pendingClozeIdx === i) state.pendingClozeIdx = -1;
    state.pausedForCloze = false;
    if(YTP && state.audioReady) YTP.playVideo();
    updateProgress();
  } else {
    input.classList.remove("pending");
    input.classList.add("wrong");
    flashFeedback(false, st.attempts >= 2 ? "Riprova ascoltando di nuovo!" : "Riprova!");
    setTimeout(() => {
      input.classList.remove("wrong");
      input.classList.add("pending");
      input.value = "";
      // dopo 3 errori, mostra prima lettera come hint
      if(st.attempts >= 3){
        input.placeholder = STORY.tokens[i].b[0] + "…";
      }
      input.focus();
    }, 700);
  }
}

/* ═══════════════════════════════════════════════════════
   REPLAY 5s INDIETRO
   ═══════════════════════════════════════════════════════ */
function replayWord(tokIdx){
  if(!state.audioReady) return;
  const tok = STORY.tokens[tokIdx];
  const from = Math.max(STORY.audioStart, tok.s - REPLAY_PRE_SEC);
  YTP.seekTo(from, true);
  YTP.playVideo();
  state.replayCount++;
  state.pausedForCloze = false;
  state.currentToken = -1;
  state.pendingClozeIdx = tokIdx;
  $$(".w.now").forEach(x => { x.classList.remove("now"); x.classList.add("read"); });
  const btn = $(`.cz[data-i="${tokIdx}"] .cz-replay`);
  if(btn){
    btn.classList.add("playing");
    setTimeout(() => btn.classList.remove("playing"), (REPLAY_PRE_SEC + 1) * 1000);
  }
}

/* ═══════════════════════════════════════════════════════
   SVELA PAROLA (escape hatch)
   ═══════════════════════════════════════════════════════ */
function revealWord(i){
  const st = state.cloze[i];
  if(!st || st.status !== 'pending') return;
  st.status = 'shown';
  state.shownCount++;
  const wrap = $(`.cz[data-i="${i}"]`);
  const input = wrap.querySelector(".cz-input");
  input.value = STORY.tokens[i].t;
  input.classList.remove("pending","wrong");
  input.classList.add("shown");
  input.disabled = true;
  wrap.classList.add("shown");
  flashFeedback(true, "Eccola!");
  if(state.pendingClozeIdx === i) state.pendingClozeIdx = -1;
  state.pausedForCloze = false;
  if(YTP && state.audioReady) YTP.playVideo();
  updateProgress();
}

/* ═══════════════════════════════════════════════════════
   TICK: sync word-level + auto-pausa cloze
   ═══════════════════════════════════════════════════════ */
function startTickLoop(){
  setInterval(tick, 80);
}
function tick(){
  if(!state.audioReady || !YTP) return;
  let t;
  try { t = YTP.getCurrentTime(); } catch(e){ return; }
  if(typeof t !== "number") return;
  state.audioTime = t;

  if(t > STORY.audioEnd - 0.2){ handleEndOfStory(); return; }

  // trova token corrente
  let cur = -1;
  // ricerca lineare con cache: parto da currentToken se valida
  const startI = (state.currentToken >= 0) ? state.currentToken : 0;
  for(let i = startI; i < STORY.tokens.length; i++){
    const tok = STORY.tokens[i];
    if(!tok.w) continue;
    if(t < tok.s - 0.001) break;
    if(t >= tok.s && t <= tok.e + 0.05){ cur = i; break; }
    if(t > tok.e + 0.05){ cur = i; }
  }
  if(cur === -1 && startI > 0){
    // siamo tornati indietro
    for(let i = 0; i < startI; i++){
      const tok = STORY.tokens[i];
      if(!tok.w) continue;
      if(t >= tok.s && t <= tok.e + 0.05){ cur = i; break; }
    }
  }

  if(cur !== state.currentToken){
    // aggiorna evidenziazione
    if(state.currentToken >= 0){
      const prev = $(`.w[data-i="${state.currentToken}"]`);
      if(prev){ prev.classList.remove("now"); prev.classList.add("read"); }
    }
    if(cur >= 0){
      const el = $(`.w[data-i="${cur}"]`);
      if(el){
        el.classList.remove("read");
        el.classList.add("now");
        // marca tutte le parole prima come "read"
        // (evito ciclo intero: solo se grosso salto)
        if(Math.abs(cur - state.currentToken) > 5){
          $$(".w").forEach(w => {
            const wi = parseInt(w.dataset.i,10);
            if(wi < cur) { w.classList.add("read"); w.classList.remove("now"); }
            else if(wi > cur) { w.classList.remove("read","now"); }
          });
        }
        // auto-scroll dolce
        const rect = el.getBoundingClientRect();
        if(rect.top < 100 || rect.bottom > window.innerHeight - 100){
          el.scrollIntoView({behavior:"smooth", block:"center"});
        }
      }
    }
    state.currentToken = cur;
  }

  // gestione auto-pausa su cloze
  if(!state.pausedForCloze){
    // cerca prossima cloze pending vicina
    for(let i = Math.max(0, state.currentToken - 1); i < STORY.tokens.length; i++){
      const tok = STORY.tokens[i];
      if(!tok.w) continue;
      const cz = state.cloze[i];
      if(!cz || cz.status !== 'pending') continue;
      if(tok.s - PAUSE_LEAD <= t && t <= tok.e + 0.1){
        // siamo arrivati alla cloze
        YTP.pauseVideo();
        state.pausedForCloze = true;
        state.pendingClozeIdx = i;
        const inp = $(`.cz[data-i="${i}"] .cz-input`);
        if(inp){
          inp.classList.add("pending");
          setTimeout(() => inp.focus(), 80);
        }
        break;
      }
      if(tok.s > t + 2) break;  // non siamo abbastanza vicini
    }
  }
}

/* ═══════════════════════════════════════════════════════
   FEEDBACK BANNER
   ═══════════════════════════════════════════════════════ */
let fbT = null;
function flashFeedback(ok, msg){
  const fb = $("#feedback");
  fb.className = ok ? "show ok" : "show ko";
  $("#feedback-text").textContent = msg;
  $("#feedback-icon").innerHTML = ok
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg>';
  clearTimeout(fbT);
  fbT = setTimeout(() => fb.className = "", 1400);
}

/* ═══════════════════════════════════════════════════════
   PROGRESSO
   ═══════════════════════════════════════════════════════ */
function updateProgress(){
  const totalCloze = (STORY.cloze[state.level] || []).length;
  const done = state.okCount + state.shownCount;
  const pct = totalCloze > 0 ? Math.round((done / totalCloze) * 100) : 0;
  $("#progress-fill").style.width = pct + "%";
  $("#progress-text").textContent = pct + "%";
  $("#stat-ok").textContent = state.okCount;
  $("#stat-total").textContent = totalCloze;
  const pill = $("#stats-pill");
  if(state.okCount > 0) pill.classList.remove("empty");
  else pill.classList.add("empty");
}

/* ═══════════════════════════════════════════════════════
   PLAY BUTTON ICON
   ═══════════════════════════════════════════════════════ */
function updatePlayButton(){
  const btn = $("#btn-play");
  btn.innerHTML = state.isPlaying
    ? '<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>';
}

/* ═══════════════════════════════════════════════════════
   FINE STORIA
   ═══════════════════════════════════════════════════════ */
let endHandled = false;
function handleEndOfStory(){
  if(endHandled) return;
  endHandled = true;
  if(YTP) YTP.pauseVideo();
  $("#done-ok").textContent = state.okCount;
  $("#done-replays").textContent = state.replayCount;
  $("#done-shown").textContent = state.shownCount;
  const total = (STORY.cloze[state.level] || []).length;
  let msg = "Hai finito la fiaba del pifferaio magico.";
  if(state.okCount === total) msg = "Hai indovinato TUTTE le parole. Sei un piccolo pifferaio campione!";
  else if(state.okCount >= total*.7) msg = "Hai fatto davvero un bel lavoro!";
  else if(state.okCount >= total*.4) msg = "Bravo! La prossima volta proverai un livello più difficile?";
  $("#done-msg").textContent = msg;
  $("#done-screen").classList.add("show");
}

/* ═══════════════════════════════════════════════════════
   CONTROLLI
   ═══════════════════════════════════════════════════════ */
$("#btn-play").addEventListener("click", () => {
  if(!state.audioReady) return;
  if(state.isPlaying){ YTP.pauseVideo(); }
  else {
    if(state.audioTime < STORY.audioStart - 0.5) YTP.seekTo(STORY.audioStart, true);
    YTP.playVideo();
  }
});

$("#btn-restart").addEventListener("click", resetSession);

function resetSession(){
  if(YTP) YTP.pauseVideo();
  if(YTP) YTP.seekTo(STORY.audioStart, true);
  state.okCount = 0; state.shownCount = 0; state.replayCount = 0;
  state.cloze = {};
  state.currentToken = -1;
  state.pausedForCloze = false;
  state.pendingClozeIdx = -1;
  endHandled = false;
  $("#done-screen").classList.remove("show");
  buildStory();
  updateProgress();
  window.scrollTo({top:0, behavior:"instant"});
}

$("#btn-menu").addEventListener("click", () => {
  $("#menu-greeting").textContent = "Ciao " + state.nick + "!";
  $$("#level-row .level-pill").forEach(p => p.classList.toggle("active", p.dataset.lv === state.level));
  $("#menu-modal").classList.add("show");
});
$("#mi-close").addEventListener("click", () => $("#menu-modal").classList.remove("show"));
$("#menu-modal").addEventListener("click", (e) => {
  if(e.target.id === "menu-modal") $("#menu-modal").classList.remove("show");
});

$$("#level-row .level-pill").forEach(p => {
  p.addEventListener("click", () => {
    const lv = p.dataset.lv;
    if(lv === state.level) return;
    state.level = lv;
    $$("#level-row .level-pill").forEach(x => x.classList.toggle("active", x === p));
    resetSession();
    $("#menu-modal").classList.remove("show");
  });
});

$("#mi-restart").addEventListener("click", () => {
  resetSession();
  $("#menu-modal").classList.remove("show");
});

$("#done-back").addEventListener("click", () => {
  $("#done-screen").classList.remove("show");
  $("#btn-menu").click();
});
$("#done-restart").addEventListener("click", () => {
  $("#done-screen").classList.remove("show");
  resetSession();
});

/* ═══════════════════════════════════════════════════════
   NICK & AVVIO
   ═══════════════════════════════════════════════════════ */
function startApp(){
  $("#tb-name").textContent = state.nick;
  $("#nick-modal").classList.add("hidden");
  buildStory();
  updateProgress();
  startTickLoop();
}

$("#nick-go").addEventListener("click", () => {
  const v = $("#nick-input").value.trim();
  state.nick = v || "Amico";
  startApp();
});
$("#nick-input").addEventListener("keydown", (ev) => {
  if(ev.key === "Enter") $("#nick-go").click();
});

/* ═══════════════════════════════════════════════════════
   BOOT: aspetta YT, poi togli loading
   ═══════════════════════════════════════════════════════ */
ytReadyP.then(() => {
  $("#loading").classList.add("hidden");
  setTimeout(() => $("#nick-input").focus(), 600);
});
// fallback: dopo 6s togli comunque il loading
setTimeout(() => $("#loading").classList.add("hidden"), 6500);
</script>
